[package]
name = "santi-runtime"
version = "0.1.0"
edition = "2021"

[dependencies]
async-stream = "0.3"
futures = "0.3"
santi-core = { path = "../santi-core" }
santi-db = { path = "../santi-db" }
santi-lock = { path = "../santi-lock" }
santi-provider = { path = "../santi-provider" }
serde = { version = "1", features = ["derive"] }
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
uuid = { version = "1", features = ["v4"] }
