services:
  postgres:
    image: postgres:16-bookworm
    ports:
      - "15432:5432"
    environment:
      POSTGRES_DB: santi
      POSTGRES_USER: santi
      POSTGRES_PASSWORD: santi
    volumes:
      - ../.docker-data/postgres/data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U santi -d santi"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  santi:
    build:
      context: .
    depends_on:
      - postgres
      - redis
      - openai-codex-server
    ports:
      - "18081:8080"
    environment:
      BIND_ADDR: "0.0.0.0:8080"
      OPENAI_API_KEY: "codex-local-dev"
      OPENAI_BASE_URL: "http://openai-codex-server:8080/api/v1"
      OPENAI_MODEL: "gpt-5.4"
      DATABASE_URL: "postgres://santi:santi@postgres:5432/santi?sslmode=disable"
      REDIS_URL: "redis://redis:6379/0"
      EXECUTION_ROOT: "/app"
      RUNTIME_ROOT: "/runtime"
      RUST_LOG: "santi_api=debug,debug"
    volumes:
      - santi-cargo-registry:/root/.cargo/registry
      - santi-cargo-git:/root/.cargo/git
      - santi-target:/root/target
      - ../.docker-data/santi/data:/data
      - ../.docker-data/santi/runtime:/runtime
      - ./:/app

  openai-codex-server:
    build:
      context: ../openai-codex-server
    ports:
      - "18082:8080"
    environment:
      PORT: "8081"
      AUTH_FILE: /app/auth.json
      API_KEY: codex-local-dev
      ADMIN_API_KEY: codex-local-admin
      SQLITE_PATH: /app/data/openai-codex-server.db
    volumes:
      - ../openai-codex-server/auth.json:/app/auth.json:ro
      - ../.docker-data/openai-codex-server/data:/app/data

volumes:
  santi-cargo-registry:
  santi-cargo-git:
  santi-target:
